name: CI

on:
  push:
    branches: [main, develop, 'release/*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check . --output-format=github
      - name: Format check
        run: ruff format --check .

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install tools
        run: pip install pip-audit detect-secrets bandit
      - name: Dependency audit
        run: pip-audit -r requirements.txt || true
      - name: Secrets scan
        run: detect-secrets scan --all-files --force-use-all-plugins 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); results=d.get('results',{}); total=sum(len(v) for v in results.values()); print(f'Found {total} potential secrets'); sys.exit(1 if total > 0 else 0)"
      - name: Bandit SAST
        run: bandit -r src/ -f json -o bandit-report.json || true
      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports: ['5432:5432']
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt 2>/dev/null || true
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short \
            --junitxml=test-results.xml \
            --cov=src --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --timeout=60 \
            -p no:schemathesis || true
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379
          ENVIRONMENT: test
          SENTRY_DSN: ""
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint, test, security]
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Review this PR for a FastAPI Python project. Check:
            1. Security (OWASP Top 10, secrets, SQL injection)
            2. Module boundaries (no cross-domain imports of internals)
            3. Async correctness (no blocking in async, proper session handling)
            4. Error handling (no bare except, Sentry integration)
            5. Tests (new code has tests, regression tests for fixes)
            6. Sentry SDK present in all entry points
            Rate quality 1-10. Block if security issue found.
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
