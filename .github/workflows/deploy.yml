name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  pre-deploy-check:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt 2>/dev/null || true
      - name: Run full test suite
        run: pytest tests/ -v --tb=short --timeout=60 -p no:schemathesis
        env:
          DATABASE_URL: ""
          SENTRY_DSN: ""
          ENVIRONMENT: test
      - name: Lint check
        run: |
          pip install ruff
          ruff check . --output-format=github
      - name: Secrets scan
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files 2>/dev/null | python3 -c "import json,sys; d=json.load(sys.stdin); r=d.get('results',{}); t=sum(len(v) for v in r.values()); sys.exit(1 if t > 0 else 0)"

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [pre-deploy-check]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: 94.198.219.232
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/project

            # Backup current state for rollback
            CURRENT_COMMIT=$(git rev-parse HEAD)

            # Pull latest
            git pull origin main
            chmod -R 755 src/ 2>/dev/null || true

            # Build and deploy
            docker compose build
            docker compose up -d

            # Health check with retry (3 attempts, 10s interval)
            for i in 1 2 3; do
              sleep 10
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Health check failed (attempt $i/3)"
            done

            # Auto-rollback on failure
            echo "ROLLING BACK to $CURRENT_COMMIT"
            git checkout "$CURRENT_COMMIT"
            docker compose build
            docker compose up -d
            exit 1

      - name: Post-deploy notification
        if: always()
        run: echo "Deploy status - ${{ job.status }}"
