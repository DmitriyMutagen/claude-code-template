services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    ports:
      - "${API_PORT:-8000}:8000"
      - "5678:5678"  # debugpy
    environment:
      DEBUG: "true"
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
      REDIS_URL: redis://redis:6379
